site_name: Dyros Robot Controller
site_description: ROS 2 robot controller library for mobile robots, manipulators, and mobile manipulators.
site_url: https://junheonyoon.github.io/dyros_robot_controller/
repo_url: https://github.com/JunHeonYoon/dyros_robot_controller
repo_name: JunHeonYoon/dyros_robot_controller
edit_uri: edit/devel/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Build and Run: getting-started/build-and-run.md
  - Concepts:
      - Controller Architecture: concepts/controller-architecture.md
      - Joint-Space Control: concepts/joint-space-control.md
      - Task-Space Control: concepts/task-space-control.md
      - QP and HQP Control: concepts/qp-and-hqp.md
  - API Guide:
      - C++ API: api/cpp.md
      - Python API: api/python.md
  - Examples:
      - Overview: examples/overview.md
      - Franka FR3: examples/fr3.md
      - FR3 on Summit XLS: examples/fr3-xls.md
  - Contributing:
      - Documentation Workflow: contributing/docs-workflow.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
